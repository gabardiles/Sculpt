# XcodeGen spec — run `xcodegen generate` (brew install xcodegen) to produce
# Sculpt.xcodeproj, then open it in Xcode. Keeps the project file out of git
# so the source tree is the single source of truth.
name: Sculpt
options:
  bundleIdPrefix: com.sculpt
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_LANGUAGE: en
    # Until you have a paid Apple Developer account, leave the team empty and
    # let Xcode use "Automatically manage signing" with your free personal
    # team — enough to build and run in the Simulator and on your own device.
    CODE_SIGN_STYLE: Automatic

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Sculpt:
    type: application
    platform: iOS
    sources:
      - path: Sculpt
      - path: Shared          # RestActivityAttributes + SharedStore (also in the widget)
    resources:
      - path: Sculpt/Resources
    dependencies:
      - package: Supabase
        product: Supabase
      - target: SculptWidgets # embeds the widget + Live Activity extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sculpt.app
        INFOPLIST_FILE: Sculpt/Info.plist
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        TARGETED_DEVICE_FAMILY: "1" # iPhone — the web app is mobile-first at 390px
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    configFiles:
      Debug: Sculpt/Config.xcconfig
      Release: Sculpt/Config.xcconfig

  SculptWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: SculptWidgets
      - path: Shared          # shared Live Activity attributes + App Group store
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sculpt.app.widgets
        INFOPLIST_FILE: SculptWidgets/Info.plist
        # The App Group + Live Activity capabilities are added in Xcode's
        # Signing & Capabilities (see README) — that auto-manages entitlements
        # so the default build doesn't require pre-provisioned App IDs.

  SculptTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SculptTests
    dependencies:
      - target: Sculpt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sculpt.app.tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  Sculpt:
    build:
      targets:
        Sculpt: all
        SculptTests: [test]
    test:
      targets:
        - SculptTests
